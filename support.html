<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — Locas</title>
  
  <link rel="icon" type="image/png" href="icon1.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #FF6B00;
      --dark: #0F0F0F;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #F5F5F5;
      --muted: #888;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center; /* Centers vertically */
      align-items: center;     /* Centers horizontally */
      height: 100vh;           /* Forces body to be exactly screen height */
      margin: 0;
      overflow: hidden;        /* Disables scrolling on the main page */
      padding: 10px;
    }

    .support-container {
      width: 100%;
      max-width: 500px;
      padding: 1.5rem;         /* Reduced padding to save space */
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .header-flex { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
    .header-flex img { width: 32px; height: 32px; border-radius: 6px; }
    
    h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; margin: 0; }
    .subtitle { color: var(--muted); margin-bottom: 1.2rem; font-size: 0.85rem; line-height: 1.3; }

    .form-group { margin-bottom: 0.8rem; } /* Tighter spacing between fields */
    label { display: block; font-size: 0.65rem; color: var(--brand); text-transform: uppercase; margin-bottom: 0.4rem; letter-spacing: 1px; font-weight: 600; }
    
    input, textarea, select {
      width: 100%;
      padding: 0.7rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      font-size: 0.85rem;
      outline: none;
    }

    /* Fixed the white dropdown issue */
    select option {
      background-color: #1A1A1A;
      color: white;
    }

    textarea { resize: none; } /* Prevents user from making the box bigger and causing a scroll */

    .btn-send {
      width: 100%;
      padding: 0.9rem;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 0.5rem;
    }

    .btn-send:hover { opacity: 0.9; }

    #status {
      margin-top: 0.8rem;
      text-align: center;
      font-size: 0.8rem;
      display: none;
    }

    .back-link { margin-top: 1rem; color: var(--muted); text-decoration: none; font-size: 0.75rem; }
  </style>
</head>
<body>

<div class="support-container">
  <div class="header-flex">
    <img src="icon1.png" alt="Logo">
    <h1>Support</h1>
  </div>
  
  <p class="subtitle">Enter your registered software email and details below.</p>

  <form id="supportForm">
    <div class="form-group">
      <label>Registered Email</label>
      <input type="email" id="email" required placeholder="name@business.com">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label>Category</label>
            <select id="category">
                <option value="Technical">Technical</option>
                <option value="Billing">Billing</option>
                <option value="Feature">Feature</option>
            </select>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Priority</label>
            <select id="priority">
                <option value="Normal">Normal</option>
                <option value="Urgent">Urgent 🔥</option>
            </select>
        </div>
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea id="message" rows="3" required placeholder="How can we help?"></textarea>
    </div>

    <button type="submit" class="btn-send" id="submitBtn">Submit Ticket</button>
  </form>

  <div id="status"></div>
</div>

<a href="index.html" class="back-link">← Back to Home</a>

<script>
  const webhookURL = "YOUR_DISCORD_WEBHOOK_URL_HERE";

  document.getElementById('supportForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    btn.disabled = true;
    btn.innerText = "Sending...";

    const data = {
      username: "Locas Support Bot",
      embeds: [{
        title: "New Support Request",
        color: 16739072,
        fields: [
          { name: "📧 Software Email", value: document.getElementById('email').value },
          { name: "📂 Category", value: document.getElementById('category').value, inline: true },
          { name: "⚠️ Priority", value: document.getElementById('priority').value, inline: true },
          { name: "💬 Message", value: document.getElementById('message').value }
        ],
        timestamp: new Date()
      }]
    };

    try {
      const response = await fetch(webhookURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        status.style.display = "block";
        status.style.color = "#4dff88";
        status.innerText = "Ticket sent!";
        document.getElementById('supportForm').reset();
      } else { throw new Error(); }
    } catch (err) {
      status.style.display = "block";
      status.style.color = "#ff4d4d";
      status.innerText = "Failed to send.";
    } finally {
      btn.disabled = false;
      btn.innerText = "Submit Ticket";
    }
  });
</script>

</body>
</html>
