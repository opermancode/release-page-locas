<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — Locas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #FF6B00;
      --dark: #0F0F0F;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #F5F5F5;
      --muted: #888;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .support-container {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin: 1rem;
    }

    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem; }

    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 1px; }
    
    input, textarea, select {
      width: 100%;
      padding: 0.8rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: white;
      outline: none;
    }

    input:focus, textarea:focus { border-color: var(--brand); }

    .btn-send {
      width: 100%;
      padding: 1rem;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-send:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-send:disabled { background: #333; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>

<div class="support-container">
  <h1>Support Ticket</h1>
  <p>Submit your issue and our team will get back to you.</p>

  <form id="supportForm">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" required placeholder="Enter your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required placeholder="email@example.com">
    </div>
    <div class="form-group">
        <label>Priority</label>
        <select id="priority">
            <option value="Normal">Normal</option>
            <option value="Urgent">Urgent 🔥</option>
        </select>
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea id="message" rows="4" required placeholder="Describe your issue..."></textarea>
    </div>
    <button type="submit" class="btn-send" id="submitBtn">Send Ticket</button>
  </form>

  <div id="status"></div>
</div>

<script>
  const webhookURL = "https://discord.com/api/webhooks/1488609903139356744/YO38r_l9_Y9Asr0FpfulvMV5VybWs7YgqOOHUazdL0wPAmki9ORv5z2m1IPO4QsKn31l";

  document.getElementById('supportForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    btn.disabled = true;
    btn.innerText = "Sending...";

    const data = {
      username: "Locas Support Bot",
      embeds: [{
        title: "New Support Ticket",
        color: 16739072, // Brand Orange
        fields: [
          { name: "User", value: document.getElementById('name').value, inline: true },
          { name: "Email", value: document.getElementById('email').value, inline: true },
          { name: "Priority", value: document.getElementById('priority').value },
          { name: "Message", value: document.getElementById('message').value }
        ],
        timestamp: new Date()
      }]
    };

    try {
      const response = await fetch(webhookURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        status.style.display = "block";
        status.style.color = "#4dff88";
        status.innerText = "Ticket sent successfully! We'll be in touch.";
        document.getElementById('supportForm').reset();
      } else {
        throw new Error();
      }
    } catch (err) {
      status.style.display = "block";
      status.style.color = "#ff4d4d";
      status.innerText = "Error sending ticket. Try again later.";
    } finally {
      btn.disabled = false;
      btn.innerText = "Send Ticket";
    }
  });
</script>

</body>
</html>
