<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — Locas Smart Billing</title>
  <link rel="icon" type="image/png" href="icon1.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #FF6B00;
      --dark: #0F0F0F;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #F5F5F5;
      --muted: #888;
      --success: #4dff88;
    }

    /* Style the dropdown list items */
select option {
  background-color: #1A1A1A; /* A dark color similar to your form background */
  color: white;
  padding: 10px;
}

/* Ensure the dropdown itself has a consistent background */
select {
  background-color: rgba(255, 255, 255, 0.05);
  color: white;
  appearance: none; /* Removes default browser styling */
}

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .support-container {
      width: 100%;
      max-width: 550px;
      padding: 2.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(10px);
    }

    h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.5; }

    .form-group { margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.7rem; color: var(--brand); text-transform: uppercase; margin-bottom: 0.6rem; letter-spacing: 1.5px; font-weight: 600; }
    
    input, textarea, select {
      width: 100%;
      padding: 0.9rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: white;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus, textarea:focus, select:focus { 
      border-color: var(--brand); 
      background: rgba(255,255,255,0.06);
    }

    .info-text { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; display: block; }

    .btn-send {
      width: 100%;
      padding: 1.1rem;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .btn-send:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,107,0,0.2); }
    .btn-send:disabled { background: #333; cursor: not-allowed; transform: none; }

    .back-link { margin-top: 2rem; color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: 0.2s; }
    .back-link:hover { color: var(--text); }

    #status {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>

<div class="support-container">
  <h1>Support Center</h1>
  <p class="subtitle">Have a question or technical issue? Fill out the form below and we'll reach out to your registered email.</p>

  <form id="supportForm">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" required placeholder="Owner or Manager Name">
    </div>

    <div class="form-group">
      <label>Software Registered Email</label>
      <input type="email" id="email" required placeholder="email@yourbusiness.com">
      <span class="info-text">Please enter the email address used to activate Locas.</span>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
            <label>Support Category</label>
            <select id="category">
                <option value="Technical Issue">Technical Issue</option>
                <option value="Billing/GST">Billing/GST Help</option>
                <option value="Inventory">Inventory Sync</option>
                <option value="Feature Request">Feature Request</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Priority</label>
            <select id="priority">
                <option value="Normal">Normal</option>
                <option value="High">Urgent 🔥</option>
            </select>
        </div>
    </div>

    <div class="form-group">
      <label>Message / Description</label>
      <textarea id="message" rows="4" required placeholder="Tell us exactly what happened..."></textarea>
    </div>

    <button type="submit" class="btn-send" id="submitBtn">Submit Ticket</button>
  </form>

  <div id="status"></div>
</div>

<a href="index.html" class="back-link">← Back to Home</a>

<script>
  // Replace this with your actual Discord Webhook URL
  const webhookURL = "YOUR_DISCORD_WEBHOOK_URL_HERE";

  document.getElementById('supportForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    btn.disabled = true;
    btn.innerText = "Processing...";

    const data = {
      username: "Locas Support",
      embeds: [{
        title: "🎫 New Support Ticket Received",
        color: 16739072, // Locas Orange
        fields: [
          { name: "👤 User", value: document.getElementById('name').value, inline: true },
          { name: "📧 Software Email", value: document.getElementById('email').value, inline: true },
          { name: "📂 Category", value: document.getElementById('category').value, inline: true },
          { name: "⚠️ Priority", value: document.getElementById('priority').value, inline: true },
          { name: "💬 Message", value: "```" + document.getElementById('message').value + "```" }
        ],
        footer: { text: "Ticket generated via locas.store Support Page" },
        timestamp: new Date()
      }]
    };

    try {
      const response = await fetch(webhookURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        status.style.display = "block";
        status.style.background = "rgba(77, 255, 136, 0.1)";
        status.style.color = "#4dff88";
        status.innerText = "Ticket sent! Our team will contact you shortly.";
        document.getElementById('supportForm').reset();
      } else {
        throw new Error();
      }
    } catch (err) {
      status.style.display = "block";
      status.style.background = "rgba(255, 77, 77, 0.1)";
      status.style.color = "#ff4d4d";
      status.innerText = "Something went wrong. Please check your internet or try again.";
    } finally {
      btn.disabled = false;
      btn.innerText = "Submit Ticket";
    }
  });
</script>

</body>
</html>
